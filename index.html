<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cancun Getaways Tours</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:url('hero.jpg') center/cover no-repeat;
height:80vh;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

header h1{
font-size:48px;
margin:0;
}

header p{
font-size:20px;
max-width:600px;
}

button{
background:#ff7a00;
border:none;
padding:15px 30px;
font-size:18px;
color:white;
cursor:pointer;
}

section{
padding:60px 10%;
}

.tours{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.tour{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.tour img{
width:100%;
height:200px;
object-fit:cover;
}

.tour h3{
padding:10px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:40px;
}

</style>
</head>

<body>

<header>
<h1>Cancun Getaways Tours</h1>
<p>Explore Cancun & Riviera Maya with unforgettable experiences.</p>
<button>View Tours</button>
</header>

<section>
<h2>Our Top Tours</h2>

<div class="tours">

<div class="tour">
<img src="tour1.jpg">
<h3>Isla Mujeres Catamaran Cruise & Snorkeling</h3>
</div>

<div class="tour">
<img src="tour2.jpg">
<h3>ATV, Zipline & Cenote Adventure</h3>
</div>

<div class="tour">
<img src="tour3.jpg">
<h3>Transparent Boat Ride Cancun</h3>
</div>

<div class="tour">
<img src="tour4.jpg">
<h3>Tulum Jungle Adventure</h3>
</div>

</div>
</section>

<footer>

<p>Email: cancungetawaystours@gmail.com</p>
<p>Phone: +52 961 105 7104</p>

</footer>

</body>
</html>
